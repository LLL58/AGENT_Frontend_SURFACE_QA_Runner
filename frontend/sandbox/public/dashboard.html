<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - Surface QA 测试</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      padding: 16px 0;
    }

    .pagination button {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .pagination button:hover:not(:disabled) {
      background: #007bff;
      color: #fff;
      border-color: #007bff;
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pagination button.active {
      background: #007bff;
      color: #fff;
      border-color: #007bff;
    }

    .page-info {
      margin: 0 12px;
      color: #666;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #ddd;
      border-top-color: #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <div class="logo">Surface QA 测试</div>
      <ul class="nav-links">
        <li><a href="/">主页</a></li>
        <li><a href="/login">登录</a></li>
        <li><a href="/dashboard" class="active">仪表盘</a></li>
        <li><a href="/profile">个人资料</a></li>
        <li><a href="/error">错误页面</a></li>
        <li><a href="/admin">权限页面</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="dashboard-section">
      <div class="dashboard-header">
        <h1>仪表盘</h1>
        <div class="dashboard-actions">
          <button id="refresh-button" data-testid="refresh-button" class="btn">刷新</button>
          <button id="export-button" data-testid="export-button" class="btn">导出</button>
          <a href="/profile" id="settings-link" data-testid="settings-link" class="btn">设置</a>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <h3>总用户数</h3>
          <p class="stat-number" id="total-users">1,234</p>
        </div>
        <div class="stat-card">
          <h3>活跃用户</h3>
          <p class="stat-number" id="active-users">567</p>
        </div>
        <div class="stat-card">
          <h3>今日访问</h3>
          <p class="stat-number" id="today-visits">890</p>
        </div>
        <div class="stat-card">
          <h3>系统状态</h3>
          <p class="stat-number status-good" id="system-status">正常</p>
        </div>
      </div>

      <div class="table-section">
        <h2>用户列表</h2>
        <table id="activity-table" data-testid="activity-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>姓名</th>
              <th>邮箱</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- 动态加载 -->
          </tbody>
        </table>

        <div class="pagination" data-testid="pagination" id="pagination">
          <button id="prev-page" data-testid="prev-page" disabled>上一页</button>
          <span class="page-info">
            第 <span id="current-page" data-testid="current-page">1</span> 页 / 共 <span id="total-pages">5</span> 页
          </span>
          <button id="next-page" data-testid="next-page">下一页</button>
          <button class="page-number" data-testid="page-number">1</button>
          <button class="page-number" data-testid="page-number">2</button>
          <button class="page-number" data-testid="page-number">3</button>
          <button class="page-number" data-testid="page-number">4</button>
          <button class="page-number" data-testid="page-number">5</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Surface QA 测试应用. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
  <script>
    // 模拟数据
    const allUsers = [];
    for (let i = 1; i <= 50; i++) {
      allUsers.push({
        id: i,
        name: `用户${i}`,
        email: `user${i}@example.com`,
        status: i % 3 === 0 ? '禁用' : '正常'
      });
    }

    const pageSize = 10;
    let currentPage = 1;
    const totalPages = Math.ceil(allUsers.length / pageSize);

    // 渲染表格
    function renderTable(page) {
      const start = (page - 1) * pageSize;
      const end = start + pageSize;
      const users = allUsers.slice(start, end);

      const tbody = document.getElementById('table-body');
      tbody.innerHTML = users.map(user => `
        <tr data-testid="table-row-${user.id}">
          <td>${user.id}</td>
          <td>${user.name}</td>
          <td>${user.email}</td>
          <td><span class="status-${user.status === '正常' ? 'success' : 'error'}">${user.status}</span></td>
        </tr>
      `).join('');

      // 更新页码
      document.getElementById('current-page').textContent = page;
      document.getElementById('total-pages').textContent = totalPages;

      // 更新按钮状态
      document.getElementById('prev-page').disabled = page <= 1;
      document.getElementById('next-page').disabled = page >= totalPages;

      // 更新页码按钮状态
      document.querySelectorAll('.page-number').forEach((btn, index) => {
        btn.classList.toggle('active', index + 1 === page);
      });
    }

    // 初始化
    renderTable(currentPage);

    // 上一页
    document.getElementById('prev-page').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        renderTable(currentPage);
      }
    });

    // 下一页
    document.getElementById('next-page').addEventListener('click', () => {
      if (currentPage < totalPages) {
        currentPage++;
        renderTable(currentPage);
      }
    });

    // 页码按钮
    document.querySelectorAll('.page-number').forEach(btn => {
      btn.addEventListener('click', () => {
        currentPage = parseInt(btn.textContent);
        renderTable(currentPage);
      });
    });

    // 刷新按钮
    document.getElementById('refresh-button').addEventListener('click', () => {
      renderTable(currentPage);
    });
  </script>
</body>
</html>
