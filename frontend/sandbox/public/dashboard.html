<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - Surface QA 测试</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav>
      <div class="logo">Surface QA 测试</div>
      <ul class="nav-links">
        <li><a href="/">主页</a></li>
        <li><a href="/login">登录</a></li>
        <li><a href="/dashboard" class="active">仪表盘</a></li>
        <li><a href="/profile">个人资料</a></li>
        <li><a href="/error">错误页面</a></li>
        <li><a href="/admin">权限页面</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="dashboard-section">
      <div class="dashboard-header">
        <h1>仪表盘</h1>
        <div class="dashboard-actions">
          <button id="refresh-button" data-testid="refresh-button" class="btn">刷新</button>
          <button id="export-button" data-testid="export-button" class="btn">导出</button>
          <a href="/profile" id="settings-link" data-testid="settings-link" class="btn">设置</a>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <h3>总用户数</h3>
          <p class="stat-number" id="total-users">1,234</p>
        </div>
        <div class="stat-card">
          <h3>活跃用户</h3>
          <p class="stat-number" id="active-users">567</p>
        </div>
        <div class="stat-card">
          <h3>今日访问</h3>
          <p class="stat-number" id="today-visits">890</p>
        </div>
        <div class="stat-card">
          <h3>系统状态</h3>
          <p class="stat-number status-good" id="system-status">正常</p>
        </div>
      </div>

      <div class="table-section">
        <h2>最近活动</h2>
        <table id="activity-table" data-testid="activity-table">
          <thead>
            <tr>
              <th>时间</th>
              <th>用户</th>
              <th>操作</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody>
            <tr data-testid="table-row-1">
              <td>2026-06-15 10:30</td>
              <td>张三</td>
              <td>登录系统</td>
              <td><span class="status-success">成功</span></td>
            </tr>
            <tr data-testid="table-row-2">
              <td>2026-06-15 10:25</td>
              <td>李四</td>
              <td>提交订单</td>
              <td><span class="status-success">成功</span></td>
            </tr>
            <tr data-testid="table-row-3">
              <td>2026-06-15 10:20</td>
              <td>王五</td>
              <td>修改资料</td>
              <td><span class="status-warning">待审核</span></td>
            </tr>
            <tr data-testid="table-row-4">
              <td>2026-06-15 10:15</td>
              <td>赵六</td>
              <td>删除记录</td>
              <td><span class="status-error">失败</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Surface QA 测试应用. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
